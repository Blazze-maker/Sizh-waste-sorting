<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - SiZH</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wave-container">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <header class="header">
        <div class="header-inner container">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 2L4 8v16l12 6 12-6V8L16 2z" fill="currentColor" opacity="0.8"/>
                        <path d="M16 6L8 10v12l8 4 8-4V10l-8-4z" fill="currentColor" opacity="0.4"/>
                        <circle cx="16" cy="16" r="4" fill="currentColor"/>
                    </svg>
                </div>
                <span class="logo-text">SiZH</span>
            </div>
            <nav class="nav-menu">
                <a href="overview.html" class="nav-link" data-page="overview">产品概述</a>
                <a href="features.html" class="nav-link" data-page="features">核心功能</a>
                <a href="modes.html" class="nav-link" data-page="modes">运行模式</a>
                <a href="architecture.html" class="nav-link" data-page="architecture">系统架构</a>
                <a href="components.html" class="nav-link" data-page="components">各单元功能</a>
                <a href="contact.html" class="nav-link active" data-page="contact">联系我们</a>
            </nav>
            <div class="header-actions">
                <button class="lang-btn" id="langToggle">EN</button>
                <button class="hamburger" aria-label="菜单">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <section class="section contact-section">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">Contact</span>
                <h2 class="section-title" data-i18n="contact.title">联系我们</h2>
                <p class="section-subtitle" data-i18n="contact.subtitle">如有任何问题或合作意向，请随时联系我们</p>
            </div>

            <div class="contact-content">
                <div class="contact-card">
                    <div class="contact-info">
                        <div class="contact-item">
                            <span class="contact-icon">👤</span>
                            <div class="contact-text">
                                <span class="contact-label" data-i18n="contact.name">姓名</span>
                                <span class="contact-value" data-i18n="contact.nameValue">司泽豪</span>
                            </div>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">📚</span>
                            <div class="contact-text">
                                <span class="contact-label" data-i18n="contact.id">学号</span>
                                <span class="contact-value" data-i18n="contact.idValue">24019100201</span>
                            </div>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">📧</span>
                            <div class="contact-text">
                                <span class="contact-label" data-i18n="contact.email">邮箱</span>
                                <span class="contact-value" data-i18n="contact.emailValue">123456@outlook.com</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="contact-message">
                    <h3 data-i18n="contact.message">留言咨询</h3>
                    <form class="contact-form">
                        <div class="form-group">
                            <label data-i18n="contact.form.name">姓名</label>
                            <input type="text" data-i18n-placeholder="contact.form.name.placeholder" placeholder="请输入您的姓名">
                        </div>
                        <div class="form-group">
                            <label data-i18n="contact.form.email">邮箱</label>
                            <input type="email" data-i18n-placeholder="contact.form.email.placeholder" placeholder="请输入您的邮箱">
                        </div>
                        <div class="form-group">
                            <label data-i18n="contact.form.message">留言内容</label>
                            <textarea data-i18n-placeholder="contact.form.message.placeholder" placeholder="请输入您的留言"></textarea>
                        </div>
                        <button type="submit" class="btn-primary" data-i18n="contact.form.submit">发送留言</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <div class="footer-logo">
                        <span class="logo-text">SiZH</span>
                        <span data-i18n="footer.product">智能垃圾分类存储机器人</span>
                    </div>
                    <p>2026 SiZH. <span data-i18n="footer.rights">保留所有权利。</span></p>
                </div>
            </div>
        </div>
    </footer>

    <script src="i18n.js"></script>
    <script src="script.js"></script>
</body>
</html>
