<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能垃圾分类存储机器人 - SiZH</title>
    <meta http-equiv="refresh" content="0; url=overview.html">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0A1929 0%, #0E2137 50%, #1A365D 100%);
            font-family: "Microsoft YaHei", sans-serif;
        }
        .loading {
            text-align: center;
            color: #e2e8f0;
        }
        .logo {
            font-size: 3rem;

            animation: pulse 1.5s ease-in-out infinite;
        }
        .text {
            font-size: 1.2rem;
            opacity: 0.7;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="logo">🗑️</div>
